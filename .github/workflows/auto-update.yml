name: Daily fixfind sync

on:
  schedule:
    - cron: '0 18 * * *'   # 18:00 UTC = 03:00 KST daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call /api/cron/sync on Vercel
        env:
          BASE_URL: ${{ secrets.VERCEL_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing VERCEL_BASE_URL or CRON_SECRET secret"; exit 1
          fi
          code=$(curl -s -o response.json -w "%{http_code}" \
            --max-time 290 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE_URL%/}/api/cron/sync")
          echo "HTTP ${code}"
          cat response.json
          [ "$code" = "200" ]
